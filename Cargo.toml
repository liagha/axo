[package]
name = "axo"
version = "0.0.0"
edition = "2021"

[features]
default = [
    "combinator",
    "initial", "scanner",
    "parser", "resolver", "analyzer"
]
combinator = []
initial = ["combinator", "scanner", "parser"]
scanner = ["combinator"]
parser = ["combinator", "scanner"]
resolver = ["combinator", "scanner", "parser"]
analyzer = ["combinator", "parser", "resolver"]
interpreter = ["combinator", "analyzer", "resolver"]
generator = ["combinator", "analyzer", "resolver", "inkwell"]

[dependencies]
broccli = { version = "0.0.22" }
orbyte = { path = "../orbyte" }
inkwell = { version = "0.8.0", features = ["llvm19-1-prefer-dynamic"], optional = true }
libc = "0.2.182"

[workspace]
members = [
    ".",
]

[profile.release]
strip = true
opt-level = "z"
lto = true
