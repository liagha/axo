[package]
name = "axo"
version = "0.1.0"
edition = "2021"

[features]
default = [
    "internal",
    "formation",
    "initial", "scanner",
    "parser", "resolver",
    "generator",
]
formation = []
internal = [
    "formation",
    "initial", "scanner",
    "parser", "resolver",
    "generator",
]
initial = ["formation", "scanner", "parser"]
scanner = ["formation"]
parser = ["formation", "scanner"]
resolver = ["scanner", "parser", "matchete"]
generator = ["resolver", "inkwell"]

[dependencies]
broccli = { version = "0.0.22" }
hashish = { version = "0.0.1" }
log = { version = "0.4.27"}
matchete = { path = "matchete", optional = true }
inkwell = { version = "0.8.0", features = ["llvm19-1-prefer-dynamic"], optional = true }

[workspace]
members = [
    ".",
]
