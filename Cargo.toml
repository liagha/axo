[package]
name = "axo"
version = "0.1.0"
edition = "2021"

[features]
default = [
    "internal",
    "combinator",
    "initial", "scanner",
    "parser", "resolver",
]
combinator = []
internal = [
    "combinator",
    "initial", "scanner",
    "parser", "resolver",
]
initial = ["combinator", "scanner", "parser"]
scanner = ["combinator"]
parser = ["combinator", "scanner"]
resolver = ["scanner", "parser"]
generator = ["resolver", "inkwell"]

[dependencies]
broccli = { version = "0.0.22" }
orbyte = { path = "../orbyte" }
inkwell = { version = "0.8.0", features = ["llvm19-1-prefer-dynamic"], optional = true }
libc = "0.2.182"

[workspace]
members = [
    ".",
]
